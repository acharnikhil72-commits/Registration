<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logic Legion — Join Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a96e;
      --gold-light: #e8c98a;
      --text: #f0ede8;
      --muted: #7a7870;
      --success: #4ade80;
      --error: #f87171;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }
 
    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(100,80,200,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
 
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      animation: fadeUp 0.8s ease both;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
 
    .club-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.3);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.8s 0.1s ease both;
    }
 
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
      animation: fadeUp 0.8s 0.2s ease both;
    }
 
    .title span {
      color: var(--gold);
    }
 
    .subtitle {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      animation: fadeUp 0.8s 0.3s ease both;
    }
 
    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s 0.4s ease both;
    }
 
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
 
    /* Fields */
    .field {
      margin-bottom: 1.4rem;
    }
 
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
 
    input, select, textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      appearance: none;
    }
 
    input:focus, select:focus, textarea:focus {
      border-color: rgba(201,169,110,0.5);
      background: rgba(201,169,110,0.04);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
    }
 
    select option {
      background: #1a1a24;
    }
 
    textarea {
      resize: none;
      height: 90px;
    }
 
    /* Row */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
 
    /* Button */
    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
 
    .btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(201,169,110,0.25);
    }
 
    .btn:active { transform: translateY(0); }
 
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
 
    .btn .btn-text { transition: opacity 0.2s; }
    .btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }
 
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
 
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
 
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
 
    .toast.success { border-color: rgba(74,222,128,0.3); }
    .toast.error   { border-color: rgba(248,113,113,0.3); }
 
    .toast-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--error); }
 
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
 
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 1.8rem 1.4rem; }
    }
  </style>
</head>
<body>
 
<div class="wrapper">
  <div class="header">
    <div class="club-tag">Logic Legion — CDI</div>
    <h1 class="title">Join the <span>Legion</span></h1>
    <p class="subtitle">Fill in your details and we'll reach out to you.</p>
  </div>
 
  <div class="card">
    <form id="regForm">
 
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Nikhil Sachar" required />
      </div>
 
      <div class="field">
        <label>USN</label>
        <input type="text" id="USN" placeholder="1CD25IC040" required />
      </div>
 
      <div class="row">
        <div class="field">
          <label>Section</label>
          <input type="text" id="section" placeholder="C9" required />
        </div>
        <div class="field">
          <label>Domain</label>
          <select id="domine" required>
            <option value="" disabled selected>Select</option>
            <option>Backend Development</option>
            <option>Frontend Development</option>
            <option>Machine Learning</option>
            <option>Data Science</option>
            <option>DevOps</option>
            <option>Cybersecurity</option>
            <option>UI/UX Design</option>
            <option>Other</option>
          </select>
        </div>
      </div>
 
      <div class="divider"><span>Why join?</span></div>
 
      <div class="field">
        <label>About You</label>
        <textarea id="abt" placeholder="Tell us why you want to join Logic Legion..." required></textarea>
      </div>
 
      <button class="btn" type="submit" id="submitBtn">
        <span class="btn-text">Submit Application</span>
        <div class="spinner"></div>
      </button>
 
    </form>
  </div>
</div>
 
<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>
 
<script>
  const form = document.getElementById('regForm');
  const btn  = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
 
  function showToast(msg, type) {
    toastMsg.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = 'toast'; }, 3500);
  }
 
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
 
    const payload = {
      USN:     document.getElementById('USN').value.trim(),
      name:    document.getElementById('name').value.trim(),
      section: document.getElementById('section').value.trim(),
      domine:  document.getElementById('domine').value,
      abt:     document.getElementById('abt').value.trim()
    };
 
    btn.disabled = true;
    btn.classList.add('loading');
 
    try {
      const res = await fetch('http://localhost:8080/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
 
      if (res.ok) {
        showToast('Application submitted successfully!', 'success');
        form.reset();
      } else {
        showToast('Something went wrong. Try again.', 'error');
      }
    } catch (err) {
      showToast('Cannot reach server. Is Spring Boot running?', 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
